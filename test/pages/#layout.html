<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="{=viewport|width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0}"/>
  {?icon{
    <link rel="icon" href="{=icon}"/>
    <link rel="shortcut" href="{=icon}"/>
    <link rel="apple-touch-icon" href="{=icon}"/>
  }}
  <link rel="manifest" href="{=manifest|/manifest.json}"/>
  {?desc{<meta name="description" content="{=$desc}"/>}}

</head>

      {@header}

    <div id="main">

        {@nav}

        {@body}
      </main>
    </div>
  </div>

</html>
